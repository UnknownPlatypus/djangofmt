# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: djangofmt
site_description: A fast, HTML aware, Django template formatter and linter, written in Rust.
site_url: https://unknownplatypus.github.io/djangofmt/docs/
repo_url: https://github.com/UnknownPlatypus/djangofmt
repo_name: UnknownPlatypus/djangofmt
docs_dir: docs
strict: true

theme:
  name: material
  custom_dir: docs/.overrides
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - navigation.path
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink:
      repo_url_shortener: true
      repo_url_shorthand: true
      user: UnknownPlatypus
      repo: djangofmt
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji

extra:
  # Surfaced as a button in the top bar by overrides/partials/header.html.
  playground_url: https://unknownplatypus.github.io/djangofmt/

nav:
  - Home: index.md
  - Getting started:
      - formatting.md
      - editor-integration.md
      - known-limitations.md
      - benchmarks.md
  - Lint rules: rules.md
  - Contributing: contributing.md
  - Changelog: changelog.md
