# Builds the playground (Deno + WASM) and the Zensical docs site, then
# deploys both as a single GitHub Pages artifact: playground at `/`, docs
# at `/docs/`.
name: "[djangofmt] Publish Playground and Docs"

on:
  # Runs during release workflow
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Run build (no deploy) on PRs touching playground, docs, rule sources, or build config
  pull_request:
    paths:
      - "playground/**"
      - "docs/**"
      - ".mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "crates/djangofmt_lint/src/**"
      - "crates/djangofmt_macros/**"
      - "crates/djangofmt_dev/**"
      - ".github/workflows/publish-playground-and-docs.yml"

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions: { id-token: write, pages: write }

# Scope the concurrency group per PR so simultaneous PR builds don't cancel each other.
# `main` deploys (and workflow_dispatch / workflow_call runs) share a single `pages-deploy`
# group, since GitHub Pages itself only accepts one deploy at a time.
concurrency:
  group: pages-${{ github.event_name == 'pull_request' && github.head_ref || 'deploy' }}
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    # Only use github-pages environment when not a PR
    environment: ${{ github.event_name != 'pull_request' && 'github-pages' || '' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: "Install Rust toolchain"
        run: rustup target add wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.13.1
      - uses: jetli/wasm-bindgen-action@20b33e20595891ab1a0ed73145d8a21fc96e7c29 # v0.2.0
      - name: "Run wasm-pack build"
        run: wasm-pack build --target web crates/djangofmt_wasm --out-dir ../../playground/pkg
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.8.2"
      - name: Install playground dependencies
        run: deno install --frozen
        working-directory: playground
      - name: Build playground
        run: deno task build
        working-directory: playground
      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Regenerate rule docs and synced pages
        run: cargo run -p djangofmt_dev -- generate-all
      - name: Sync docs dependencies
        run: uv sync --group docs --no-install-project
      - name: Build docs site
        run: uv run --no-sync zensical build --clean --strict --config-file .mkdocs.yml
      - name: Stage combined Pages artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p _site
          cp -r playground/dist/. _site/
          mkdir -p _site/docs
          cp -r site/. _site/docs/
      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "_site"
      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
