# Run `cargo bloat` for finding out what takes most of the space in your executable.
name: Cargo Bloat

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name"
        required: true
        default: "main"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bloat:
    name: Cargo Bloat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.branch }}
          persist-credentials: false
      - uses: cargo-bins/cargo-binstall@aaa84a43aec4955a42c5ffc65d258961e39f276e # v1.19.1
      - run: cargo binstall --no-confirm cargo-bloat
      - name: Run
        env:
          RUSTFLAGS: "-C debuginfo=2 -C strip=none"
        shell: bash
        run: |
          {
            echo "# Bloat Summary"
            echo
            echo "## Largest functions"
            echo '```'
            echo
            cargo bloat --release -p djangofmt -n 15 2> /dev/null
            echo
            echo '```'
            echo
            echo "## Largest crates"
            echo '```'
            echo
            cargo bloat --release -p djangofmt --crates -n 15 2> /dev/null
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
