name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "**"

permissions: {}

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # renovate: datasource=github-releases depName=astral-sh/uv
  UV_VERSION: 0.11.21
  # Make sure CI fails on all warnings, including Clippy lints
  RUSTFLAGS: "-Dwarnings"
  # Line-tables-only debug info: faster builds, backtraces still work.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

jobs:
  changed_files:
    name: "Determine which files changed"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      code: ${{ steps.changed.outputs.code_any_changed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: true

      - uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: changed
        with:
          files_yaml: |
            code:
              - python/**
              - crates/**
              - .github/workflows/ci.yml
              - Cargo.toml
              - Cargo.lock
              - rust-toolchain.toml
              - rustfmt.toml
              - clippy.toml

  build-and-compare:
    name: "Ecosystem check"
    runs-on: ubuntu-24.04
    needs: changed_files
    if: ${{ github.event_name == 'pull_request' && needs.changed_files.outputs.code == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          persist-credentials: false
      - name: Build main version
        run: cargo build -p djangofmt --release --verbose && mv target/release/djangofmt ./main_djangofmt

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          clean: false

      - name: Build PR version
        run: cargo build -p djangofmt --release --verbose && mv target/release/djangofmt ./pr_djangofmt

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - name: Install rustywind
        run: npm install -g rustywind

      - name: Run `djangofmt` ecosystem check
        run: |
          # Set pipefail to avoid hiding errors with tee
          set -eo pipefail

          uv venv --python 3.12
          uv pip install ./python/ecosystem-check

          printf "### \`pr\` vs \`main\` format diff\n" >> ecosystem-result
          uv run ecosystem-check format ./main_djangofmt ./pr_djangofmt --cache-dir ./checkouts | tee -a ecosystem-result

          printf "\n### \`pr\` format stability\n" >> ecosystem-result
          uv run ecosystem-check format ./pr_djangofmt ./pr_djangofmt --cache-dir ./checkouts --format-comparison base-then-comp | tee -a ecosystem-result

          printf "\n### \`pr\` + \`rustywind\` format stability\n" >> ecosystem-result
          uv run ecosystem-check format rustywind ./pr_djangofmt  --cache-dir ./checkouts --format-comparison base-then-comp-converge | tee -a ecosystem-result

          printf "\n### \`pr\` + \`djade\` format stability\n" >> ecosystem-result
          uv run ecosystem-check format djade ./pr_djangofmt --cache-dir ./checkouts --format-comparison base-then-comp-converge | tee -a ecosystem-result

          printf "\n---\n\n### \`pr\` vs \`main\` check diff\n" >> ecosystem-result
          uv run ecosystem-check check ./main_djangofmt ./pr_djangofmt --cache-dir ./checkouts | tee -a ecosystem-result

          if [ "$(stat -c%s "ecosystem-result")" -gt 1024000 ]; then
            echo -e "\n\n> [!CAUTION]\n> **Summary Truncated:** The original output was $(du -h ecosystem-result | cut -f1), which exceeds GitHub's 1024k limit." >> "$GITHUB_STEP_SUMMARY"
          fi

          head -c 1000k ecosystem-result >> "$GITHUB_STEP_SUMMARY"

      - name: Generate comment content
        id: generate-comment
        run: |
          # Note this identifier is used to find the comment to update on subsequent runs
          echo '<!-- generated-comment ecosystem -->' >> placeholder-comment.txt

          {
            cat placeholder-comment.txt
            echo "## \`ecosystem-check\` results"
            cat ecosystem-result
          } >> full-comment.txt

          # Determine if the comment exceeds 65536 characters
          char_count=$(wc -c < full-comment.txt)
          if [ "$char_count" -gt 65536 ]; then
              {
                cat placeholder-comment.txt
                echo "## \`ecosystem-check\` results (partial, see full diff [here](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))"
                cat ecosystem-result
              } > full-comment.txt
          fi

      - name: Upload ecosystem result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ecosystem-result
          path: full-comment.txt

      - name: Store pr-number
        run: |
          echo ${{ github.event.number }} > pr-number

      - name: Upload pr-number
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-number
          path: pr-number

  clippy_check:
    name: "cargo clippy"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup component add clippy
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features

  cargo-shear:
    name: "cargo shear"
    runs-on: ubuntu-24.04
    needs: changed_files
    if: ${{ needs.changed_files.outputs.code == 'true' || github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cargo-bins/cargo-binstall@30b5ca8b54e1dcffd9548bc87ede1531310fdc67 # v1.20.0
      - run: cargo binstall --no-confirm cargo-shear
      - run: cargo shear

  test:
    name: "cargo test + coverage"
    runs-on: ubuntu-24.04
    needs: changed_files
    if: ${{ needs.changed_files.outputs.code == 'true' || github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --workspace --exclude djangofmt_dev --all-targets --all-features --fail-under-lines 85

  docs_check:
    name: "rule docs up to date"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: cargo run -p djangofmt_dev -- generate-all
      - name: Verify rule docs are up to date
        run: |
          git add --intent-to-add docs/
          git diff HEAD --exit-code -- docs/
