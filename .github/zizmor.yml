# Configuration for the zizmor static analysis tool, run via pre-commit in CI
# https://docs.zizmor.sh/configuration/
#
# All ignores below are scoped to `release.yml`, which is autogenerated by
# `cargo dist`. We've manually audited the suppressed findings for safety.
rules:
  secrets-inherit:
    ignore:
      - release.yml
  template-injection:
    ignore:
      - release.yml
  excessive-permissions:
    ignore:
      - release.yml
