<!-- Clean action values -->
<form action="{% url 'submit' %}">Submit</form>
<form action="#">Submit</form>

<!-- Template tag without extra whitespace -->
<form action="{% url 'foo:bar' %}">Submit</form>
<form action="{% url 'foo:bar' %} {{ asdf }}">Submit</form>

<!-- data-action is not checked (only action attribute) -->
<form action="#"
    method="get"
    data-action="
        submit:my-custom-element#handleFormSubmit
        click:my-custom-element#handleClick
    ">Submit
</form>

<!-- Interpolation - dynamic values should be skipped -->
<form action="{{ action_url }}">Submit</form>
<form action=" {% url 'foo:bar' %} ">Submit</form>
<form action="{% url 'foo:bar' %} ">Submit</form>

<!-- No action attribute -->
<form method="post">Submit</form>
