<!-- Invalid methods -->
<form method="put">Submit</form>
<form method="delete">Submit</form>
<form method="patch">Submit</form>

<!-- Uppercase methods (valid values, but should be lowercase) -->
<form method="GET">Submit</form>
<form method="POST">Submit</form>

<!-- Nested in Jinja block -->
{% if show_form %}
    <form method="invalid">Submit</form>
{% endif %}
