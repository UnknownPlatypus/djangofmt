<!-- Uppercase method -->
<form method="GET">Submit</form>
<form method="POST">Submit</form>

<!-- Mixed case -->
<form method="Post">Submit</form>
<form method="Get">Submit</form>

<!-- Case-insensitive tag name -->
<FORM method="POST">Submit</FORM>

<!-- Multiline form with uppercase method -->
<form
    action="/submit/"
    method="POST"
>Submit</form>

<!-- Nested in Jinja block -->
{% if show_form %}
    <form method="GET">Submit</form>
{% endif %}
