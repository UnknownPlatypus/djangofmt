<!-- No duplicate attributes -->
<div id="main" class="container">Content</div>

<!-- Similar but distinct attribute names -->
<div data-class="a" class="b">Content</div>
<svg width="16" stroke-width="2"><path d="M0 0" /></svg>
<rect x="2" y="3" rx="1" />

<!-- AlpineJS shorthand vs regular -->
<img src="img.jpg" :src="isLoaded ? url : default" alt="test" height="10" width="10" />

<!-- Same attribute name on different elements -->
<a href="https://one.com">One</a>
<a href="https://two.com">Two</a>

<!-- Single attribute -->
<div class="only-one">Content</div>
