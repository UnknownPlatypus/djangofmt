<!-- Plain duplicate -->
<br class="a" id="asdf" class="b" />

<!-- Duplicate on a hyphenated data-* attribute -->
<div data-class="a" id="asdf" data-class="b"></div>

<!-- Duplicate on an attribute with a leading hyphen -->
<svg -width="16" -width="2"></svg>

<!-- Case-insensitive: HTML attribute names are case-insensitive -->
<input name="x" NAME="y">

<!-- Three occurrences report two diagnostics -->
<input type="text" type="email" type="search">

<!-- Alpine-style duplicate (same prefix on both, real duplicate) -->
<img :src="img.jpg" :src="isLoaded ? url : defaultValue" />

<!-- Boolean attributes still count -->
<input disabled disabled>
