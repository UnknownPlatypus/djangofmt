<!DOCTYPE html>
<!-- Has lang attribute -->
<html lang="en">
</html>

<!-- Case-insensitive attribute name -->
<html LANG="en">
</html>

<!-- Lang with other attributes -->
<html lang="fr" class="no-js">
</html>

<!-- Non-html tags are not checked -->
<div>Content</div>

<!-- Interpolated lang value -->
<html lang="{{ language }}">
</html>
