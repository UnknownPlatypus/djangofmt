<!-- Utility classes in the wrong order -->
<div class="p-4 flex m-4"></div>

<!-- Variant utilities mixed in with their base utilities -->
<button class="p-4 m-4 flex hover:p-1">Save</button>

<!-- Display/layout utilities reordered -->
<span class="flex-col inline flex">Label</span>

<!-- Responsive variants regrouped by breakpoint -->
<div class="sm:flex hidden md:grid lg:block"></div>

<!-- Dark-mode variant ordering -->
<div class="p-2 dark:bg-gray-800 bg-white"></div>

<!-- Real-world Example -->
<a class="text-white bg-blue-700 btn hover:bg-blue-900 mt-4">Sign up</a>
<button class="text-white bg-purple-600 hover:bg-purple-800 focus:ring-4 focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5">Submit</button>

<!-- With prefix (v3) -->
<a class="tw-text-white tw-bg-blue-700 btn hover:tw-bg-blue-900 tw-mt-4">Sign up</a>
<button class="tw-text-white tw-bg-purple-600 hover:tw-bg-purple-800 focus:tw-ring-4 focus:tw-ring-primary-300 tw-font-medium tw-rounded-lg tw-text-sm tw-px-5 tw-py-2.5">Submit</button>

<!-- With prefix (v4) -->
<a class="tw:text-white tw:bg-blue-700 btn tw:hover:bg-blue-900 tw:mt-4">Sign up</a>
<button class="tw:text-white tw:bg-purple-600 tw:hover:bg-purple-800 tw:focus:ring-4 tw:focus:ring-primary-300 tw:font-medium tw:rounded-lg tw:text-sm tw:px-5 tw:py-2.5">Submit</button>
