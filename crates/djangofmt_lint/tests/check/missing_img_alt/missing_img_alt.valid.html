<!-- Has alt attribute -->
<img alt="A photo" />
<img src="photo.jpg" alt="A photo" />
<img src="photo.jpg" alt="A photo" height="12" width="12" />

<!-- Empty alt is valid (decorative images per WCAG) -->
<img alt="" />
<img src="decorative.png" alt="" />

<!-- Alt with interpolation -->
<img alt="{{ description }}" />
<img alt="{% if x %}photo{% else %}image{% endif %}" />

<!-- Case-insensitive attribute matching -->
<img ALT="A photo" />
<img Alt="A photo" />

<!-- Multiline tag with alt -->
<img
    src="photo.jpg"
    alt="A photo"
    height="12"
    width="12"
/>

<!-- Nested in Jinja block -->
{% if show_image %}
    <img src="photo.jpg" alt="A photo" />
{% endif %}

<!-- Non-img tags without alt are fine -->
<div></div>
<span></span>
<video src="video.mp4"></video>
