<!-- Has alt attribute -->
<img alt="A photo" height="12" width="12" />
<img src="photo.jpg" alt="A photo" height="12" width="12" />
<img src="photo.jpg" alt="A photo" height="12" width="12" />

<!-- Empty alt is valid (decorative images per WCAG) -->
<img alt="" height="12" width="12" />
<img src="decorative.png" alt="" height="12" width="12" />

<!-- Alt with interpolation -->
<img alt="{{ description }}" height="12" width="12" />
<img alt="{% if x %}photo{% else %}image{% endif %}" height="12" width="12" />

<!-- Case-insensitive attribute matching -->
<img ALT="A photo" height="12" width="12" />
<img Alt="A photo" height="12" width="12" />

<!-- Multiline tag with alt -->
<img
    src="photo.jpg"
    alt="A photo"
    height="12"
    width="12"
/>

<!-- Nested in Jinja block -->
{% if show_image %}
    <img src="photo.jpg" alt="A photo" height="12" width="12" />
{% endif %}

<!-- Non-img tags without alt are fine -->
<div>Content</div>
<span>Content</span>
<video src="video.mp4">Your browser does not support video.</video>
