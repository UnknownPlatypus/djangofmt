<!-- Empty id -->
<div id="">Content</div>

<!-- Empty class -->
<div class="">Content</div>

<!-- Both empty id and class -->
<div id="" class="">Content</div>

<!-- Empty with single quotes -->
<div id=''>Content</div>

<!-- Case-insensitive attribute name -->
<div ID="">Content</div>
<div CLASS="">Content</div>

<!-- Various elements -->
<span class="">Content</span>
<p id="">Content</p>

<!-- Nested in Jinja block -->
{% if show %}
    <div id="" class="container">Content</div>
{% endif %}
