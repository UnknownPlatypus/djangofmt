ci:
  autoupdate_schedule: monthly
  skip:
    - dprint # dprint does not work offline https://github.com/dprint/dprint/issues/895
    - actionlint
    - cargo-clippy
    - cargo-fmt
    - renovate-config-validator
    - tombi-format
    - uv-lock
    - uv-sync

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: \.snap|^crates/djangofmt/src/args\.rs$
  - repo: https://github.com/asottile/pyupgrade
    rev: 75992aaa40730136014f34227e0135f63fc951b4  # frozen: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py311-plus]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: c60c980e561ed3e73101667fe8365c609d19a438  # frozen: v0.15.9
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/crate-ci/typos
    rev: f06b85043a5ab470afbb0a5592456e733243983a  # frozen: v1
    hooks:
      - id: typos
        exclude: "CHANGELOG.md"
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 8e5c80792e2ec0c87804d8ef915bf35e2caea6da  # frozen: v1.20.0
    hooks:
      - id: mypy
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: e26a818fd47b4f33cefa99035d1265b0849f4b47  # frozen: v3.13.0-1
    hooks:
      - id: shfmt
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: 278e5cffad3af72e94baa7f447ee9d4752ef43c7  # frozen: v0.9.15
    hooks:
      - id: tombi-format
        exclude: Cargo.lock
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: ea2eb407b4cbce87cf0d502f36578950494f5ac9  # frozen: v1.23.1
    hooks:
      - id: zizmor
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint
        additional_dependencies:
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1"
        exclude: .github/workflows/release.yml # Autogenerated file
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 803e8d23d9afb0549218312b6f59fb9b3c10c24e  # frozen: 43.104.7
    hooks:
      - id: renovate-config-validator
        args: [--strict]
  - repo: https://github.com/oxipng/oxipng
    rev: d54e7c04ea58170167d95d9b2b2ec07571602fe2  # frozen: v10.1.0
    hooks:
      - id: oxipng
        args: ["-o", "max", "--strip", "safe", "--alpha"]
  - repo: https://github.com/UnknownPlatypus/jpegoptim-py
    rev: a3e484551de3e40f65c72a62621ad5578d650757  # frozen: V1.5.6.1
    hooks:
      - id: jpegoptim
        args: [--strip-all, --all-progressive, --max=85, --threshold=3]
  - repo: https://github.com/trim21/dprint-pre-commit
    rev: d9ca7b0500b190020b0ae6ebfa259d37d685ad60  # frozen: v0.53.1.0
    hooks:
      - id: dprint
        exclude: |
          (?x)^(
              .pre-commit-config.yaml|
              crates/.*
          )$
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 33ae92ed9b1a4392c8ac5fdef46887640d866e1e  # frozen: 0.5.0
    hooks:
      - id: cargo-fmt
      - id: cargo-clippy
        args: [
          "--all-targets",
          "--all-features",
          "--fix",
          "--allow-staged",
          "--allow-dirty",
        ]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0397b68f6f88c024f1d2b355a9818779f6336d16  # frozen: 0.11.3
    hooks:
      - id: uv-lock
      - id: uv-sync
