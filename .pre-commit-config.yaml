ci:
  autoupdate_schedule: monthly
  skip:
    - dprint # dprint does not work offline https://github.com/dprint/dprint/issues/895
    - actionlint
    - cargo-clippy
    - cargo-fmt
    - renovate-config-validator
    - tombi-format
    - uv-lock
    - uv-sync

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: \.snap|^crates/djangofmt/src/args\.rs$
  - repo: https://github.com/asottile/pyupgrade
    rev: 75992aaa40730136014f34227e0135f63fc951b4  # frozen: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py311-plus]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 0671d8ab202c4ac093b78433ae5baf74f3fc7246  # frozen: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/crate-ci/typos
    rev: 0758ccd3261dc7b0594e9b698113eb08d3ba25b5  # frozen: v1
    hooks:
      - id: typos
        exclude: "^(CHANGELOG\\.md|docs/changelog\\.md)$"
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0
    hooks:
      - id: mypy
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: 05c1426671b9237fb5e1444dd63aa5731bec0dfb  # frozen: v3.13.1-1
    hooks:
      - id: shfmt
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: 508f918710363b5684342a0c001c44986d825f1e  # frozen: v1.1.1
    hooks:
      - id: tombi-format
        exclude: Cargo.lock
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
    hooks:
      - id: zizmor
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint
        additional_dependencies:
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1"
        exclude: .github/workflows/release.yml # Autogenerated file
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: a619ca7a48fb76413179a0df20f6b0095035f0c2  # frozen: 43.207.3
    hooks:
      - id: renovate-config-validator
        args: [--strict]
  - repo: https://github.com/oxipng/oxipng
    rev: 628e241e23f368097883807fa6e985ccf7c00357  # frozen: v10.1.1
    hooks:
      - id: oxipng
        args: ["-o", "max", "--strip", "safe", "--alpha"]
  - repo: https://github.com/UnknownPlatypus/jpegoptim-py
    rev: a3e484551de3e40f65c72a62621ad5578d650757  # frozen: V1.5.6.1
    hooks:
      - id: jpegoptim
        args: [--strip-all, --all-progressive, --max=85, --threshold=3]
  - repo: https://github.com/trim21/dprint-pre-commit
    rev: d9ca7b0500b190020b0ae6ebfa259d37d685ad60  # frozen: v0.53.1.0
    hooks:
      - id: dprint
        exclude: |
          (?x)^(
              .pre-commit-config.yaml|
              crates/.*|
              docs/\.overrides/.*|
              docs/rules\.md|
              docs/rules/.*|
              docs/index\.md|
              docs/changelog\.md|
              docs/contributing\.md
          )$
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 33ae92ed9b1a4392c8ac5fdef46887640d866e1e  # frozen: 0.5.0
    hooks:
      - id: cargo-fmt
      - id: cargo-clippy
        args: [
          "--all-targets",
          "--all-features",
          "--fix",
          "--allow-staged",
          "--allow-dirty",
        ]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 254dd0011fda0cd4bbb281ff135792b157e43e1f  # frozen: 0.11.17
    hooks:
      - id: uv-lock
      - id: uv-sync
