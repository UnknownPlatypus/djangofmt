ci:
  autoupdate_schedule: monthly
  skip:
    - dprint # dprint does not work offline https://github.com/dprint/dprint/issues/895
    - actionlint
    - cargo-clippy
    - cargo-fmt
    - renovate-config-validator
    - tombi-format
    - uv-lock
    - uv-sync

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: \.snap|args.rs$
  - repo: https://github.com/asottile/pyupgrade
    rev: 75992aaa40730136014f34227e0135f63fc951b4  # frozen: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py311-plus]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: a27a2e47c7751b639d2b5badf0ef6ff11fee893f  # frozen: v0.15.4
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/crate-ci/typos
    rev: 5745f2a8dd91cd7b684680e2e10a2b388ba6e5cf  # frozen: v1
    hooks:
      - id: typos
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: a66e98df7b4aeeb3724184b332785976d062b92e  # frozen: v1.19.1
    hooks:
      - id: mypy
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: 2a30809d16bc7a60d9b97353c797f42b510d3368 # frozen: v3.12.0-2
    hooks:
      - id: shfmt
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: 6e2c769fee2c31f44afa68b5a3c7b7e71457305f  # frozen: v0.8.0
    hooks:
      - id: tombi-format
        exclude: Cargo.lock
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: b546b77c44c466a54a42af5499dcc0dcc1a3193f  # frozen: v1.22.0
    hooks:
      - id: zizmor
  - repo: https://github.com/rhysd/actionlint
    rev: 393031adb9afb225ee52ae2ccd7a5af5525e03e8  # frozen: v1.7.11
    hooks:
      - id: actionlint
        additional_dependencies:
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1"
        exclude: .github/workflows/release.yml # Autogenerated file
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: f0e6ceba67ddc19b6777264d285c5edac87dc096  # frozen: 43.48.2
    hooks:
      - id: renovate-config-validator
        args: [--strict]
  - repo: https://github.com/oxipng/oxipng
    rev: d54e7c04ea58170167d95d9b2b2ec07571602fe2  # frozen: v10.1.0
    hooks:
      - id: oxipng
        args: ["-o", "max", "--strip", "safe", "--alpha"]
  - repo: https://github.com/UnknownPlatypus/jpegoptim-py
    rev: a3e484551de3e40f65c72a62621ad5578d650757  # frozen: V1.5.6.1
    hooks:
      - id: jpegoptim
        args: [--strip-all, --all-progressive, --max=85, --threshold=3]
  - repo: https://github.com/trim21/dprint-pre-commit
    rev: f121bca6d3c30f957c28a2f2dfdeb581dcb13028  # frozen: v0.52.0.0
    hooks:
      - id: dprint
        exclude: |
          (?x)^(
              .pre-commit-config.yaml|
              crates/.*
          )$
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 33ae92ed9b1a4392c8ac5fdef46887640d866e1e  # frozen: 0.5.0
    hooks:
      - id: cargo-fmt
      - id: cargo-clippy
        args: [
          "--all-targets",
          "--all-features",
          "--fix",
          "--allow-staged",
          "--allow-dirty",
        ]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 099118db1761b62a9c5a3680a66fa6e2d973bcad  # frozen: 0.10.7
    hooks:
      - id: uv-lock
      - id: uv-sync
